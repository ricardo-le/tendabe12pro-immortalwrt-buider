name: Build ImmortalWrt

on:
  schedule:
    - cron: '0 15 */3 * *' # 每 3 天的 UTC 15:00 (北京时间凌晨 00:00) 自动触发编译
  workflow_dispatch:      # 允许你在 GitHub 页面上手动点击 "Run workflow" 随时触发

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  CONFIG_FILE: tendabe12pro.config

# 【新增】必须赋予 Action 写入权限，否则无法自动创建 Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space (GitHub 虚拟机瘦身)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /etc/amdrpc
        sudo docker image prune -a -f
        df -h

    - name: Install Compilation Dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build psmisc qemu-utils rsync scons squashfs-tools subversion swig texinfo u-boot-tools upx-ucl unzip vim wget xmlto xz-utils zlib1g-dev
        sudo apt-get clean
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: Clone ImmortalWrt Source
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        echo "WORK_DIR=$GITHUB_WORKSPACE/openwrt" >> $GITHUB_ENV

    - name: Update & Install Feeds
      run: |
        cd $WORK_DIR
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE $WORK_DIR/.config
        cd $WORK_DIR
        # 核心步骤：用 defconfig 补充新源码中缺失的默认配置，保证编译不因配置残缺而卡死
        make defconfig

    - name: Download Packages
      run: |
        cd $WORK_DIR
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      id: compile
      run: |
        cd $WORK_DIR
        echo "$(nproc) thread compile"
        # 默认使用最大线程编译，如果失败则自动切换单线程输出详细日志
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        
        # 【修改】获取当前源码的 commit hash (前 7 位)
        COMMIT_HASH=$(git rev-parse --short HEAD)
        
        # 【修改】生成 Release Tag：时间_分支哈希 (例如 202605172030_1a2b3c4)
        RELEASE_TAG="$(date +"%Y%m%d%H%M")_${COMMIT_HASH}"
        echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

    - name: Organize Artifacts
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd $WORK_DIR/bin/targets/*/*
        # 【修改】创建一个临时目录存放要上传的指定 bin 文件
        mkdir -p $GITHUB_WORKSPACE/release_firmware
        # 找到指定的 sysupgrade.bin 文件并复制到临时目录
        find . -name "immortalwrt-mediatek-filogic-tenda_be12-pro-squashfs-sysupgrade.bin" -exec cp {} $GITHUB_WORKSPACE/release_firmware/ \;

    - name: Upload Firmware to Release
      uses: softprops/action-gh-release@v2
      if: steps.compile.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        # Release 标题
        name: ImmortalWrt BE12 Pro - ${{ env.RELEASE_TAG }}
        # 指定上传的文件路径
        files: release_firmware/immortalwrt-mediatek-filogic-tenda_be12-pro-squashfs-sysupgrade.bin
        body: |
          自动编译的 Tenda BE12 Pro 固件。
          分支: `${{ env.REPO_BRANCH }}`
          源码版本: `${{ env.RELEASE_TAG }}`
